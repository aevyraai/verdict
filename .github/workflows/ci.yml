name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1"  # Every Monday at 9am UTC
  workflow_dispatch:  # Enables "Run workflow" button in the Actions tab

jobs:
  # ---------------------------------------------------------------------------
  # Unit tests — no API keys or services needed, always runs
  # ---------------------------------------------------------------------------
  unit:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/test_dataset.py tests/test_cli.py -v

  # ---------------------------------------------------------------------------
  # Ollama integration — pulls a small model, free, no secrets needed
  # ---------------------------------------------------------------------------
  ollama:
    name: Ollama integration
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama server
        run: ollama serve &

      - name: Wait for Ollama to be ready
        run: |
          for i in $(seq 1 15); do
            curl -s http://localhost:11434/api/tags && break
            echo "Waiting for Ollama... ($i)"
            sleep 2
          done

      - name: Pull model
        run: ollama pull llama3.2:1b

      - name: Run Ollama tests
        run: pytest tests/test_ollama.py -v

  # ---------------------------------------------------------------------------
  # vLLM integration — CPU-only with a tiny model, no secrets needed
  # ---------------------------------------------------------------------------
  vllm:
    name: vLLM integration
    runs-on: ubuntu-latest
    if: false  # vLLM CPU mode unstable on GitHub Actions runners — test locally

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h

      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-facebook-opt-125m

      - name: Install vLLM (CPU only)
        run: pip install vllm --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Start vLLM server
        env:
          CUDA_VISIBLE_DEVICES: ""
          VLLM_TARGET_DEVICE: "cpu"
        run: |
          python -m vllm.entrypoints.openai.api_server \
            --model facebook/opt-125m \
            --port 8000 \
            --device cpu \
            --dtype float32 > /tmp/vllm.log 2>&1 &
          echo $! > /tmp/vllm.pid

      - name: Wait for vLLM to be ready
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/health; then
              echo "vLLM is ready after $((i * 5))s"
              exit 0
            fi
            echo "Waiting for vLLM... ($i/60)"
            sleep 5
          done
          echo "vLLM failed to start after 5 minutes. Last logs:"
          tail -50 /tmp/vllm.log
          exit 1

      - name: Run vLLM tests
        env:
          VLLM_MODEL: facebook/opt-125m
          VLLM_BASE_URL: http://localhost:8000/v1
        run: pytest tests/test_vllm.py -v

  # ---------------------------------------------------------------------------
  # OpenRouter integration — uses free-tier model, needs secret
  # ---------------------------------------------------------------------------
  openrouter:
    name: OpenRouter integration
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Check API key is set
        run: |
          if [ -z "${{ secrets.OPENROUTER_API_KEY }}" ]; then
            echo "OPENROUTER_API_KEY secret is not set. Add it in Settings → Secrets → Actions."
            exit 1
          fi

      - name: Run OpenRouter tests
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: pytest tests/test_openrouter.py -v

  # ---------------------------------------------------------------------------
  # OpenAI integration — uses gpt-4o-mini, needs secret + funded account
  # ---------------------------------------------------------------------------
  openai:
    name: OpenAI integration
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Check API key is set
        run: |
          if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "OPENAI_API_KEY secret is not set. Add it in Settings → Secrets → Actions."
            exit 1
          fi

      - name: Run OpenAI tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: pytest tests/test_openai.py -v
