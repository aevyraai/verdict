name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1"  # Every Monday at 9am UTC — catches new CVEs without a code change
  workflow_dispatch:

permissions:
  contents: read
  security-events: write  # required to upload SARIF results to the Security tab

jobs:
  # ---------------------------------------------------------------------------
  # CodeQL — static analysis of Python source for security vulnerabilities
  # ---------------------------------------------------------------------------
  codeql:
    name: CodeQL (Python)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"

  # ---------------------------------------------------------------------------
  # pip-audit — dependency vulnerability scan against the Python Advisory DB
  # ---------------------------------------------------------------------------
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package (all optional backends)
        run: pip install -e ".[dev]"

      - name: Audit dependencies
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: "."

  # ---------------------------------------------------------------------------
  # Bandit — Python-specific SAST: catches eval/exec, subprocess injection,
  # hardcoded passwords, insecure deserialisation, and similar AI-code risks.
  # -ll = medium + high severity only (skips low-severity noise).
  # ---------------------------------------------------------------------------
  bandit:
    name: Bandit (Python SAST)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit
        run: bandit -r src/ -ll --format txt

  # ---------------------------------------------------------------------------
  # detect-secrets — scans for accidentally committed credentials, API keys,
  # tokens, and other secrets. Fails if any NEW secrets appear vs. the
  # baseline (baseline committed at .secrets.baseline).
  # ---------------------------------------------------------------------------
  secrets:
    name: Secret scanning (detect-secrets)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Scan for secrets
        run: |
          if [ -f .secrets.baseline ]; then
            # Scan against the committed baseline — only NEW unaudited secrets fail.
            detect-secrets scan --baseline .secrets.baseline --exclude-files '\.secrets\.baseline' --exclude-files '\.github/' > /tmp/secrets-scan.json
          else
            detect-secrets scan --exclude-files '\.secrets\.baseline' --exclude-files '\.github/' > /tmp/secrets-scan.json
          fi
          python3 - <<'EOF'
          import json, sys
          data = json.load(open("/tmp/secrets-scan.json"))
          # Only flag secrets that have NOT been audited as false positives.
          new_secrets = {
              f: [s for s in findings if not s.get("is_verified") and s.get("is_secret") is not False]
              for f, findings in data.get("results", {}).items()
          }
          new_secrets = {f: v for f, v in new_secrets.items() if v}
          if new_secrets:
              print("New secrets detected — remove them or audit .secrets.baseline to allowlist false positives.")
              for f, findings in new_secrets.items():
                  for s in findings:
                      print(f"  {f}:{s['line_number']} ({s['type']})")
              sys.exit(1)
          print("No new secrets found.")
          EOF
