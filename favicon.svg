<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="bg-fav" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#06090f"/>
      <stop offset="100%" stop-color="#010208"/>
    </radialGradient>
  </defs>
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="url(#bg-fav)"/>
  <!-- Accretion disk -->
  <ellipse cx="16" cy="16" rx="13" ry="3" fill="none" stroke="#cc5500" stroke-width="2" opacity="0.5"/>
  <ellipse cx="16" cy="16" rx="10" ry="2.2" fill="none" stroke="#ff8800" stroke-width="1.2" opacity="0.8"/>
  <!-- Signal lines left -->
  <line x1="2"  y1="13" x2="2"  y2="19" stroke="#00ccff" stroke-width="1" opacity="0.8"/>
  <line x1="5"  y1="12" x2="5"  y2="20" stroke="#00ddff" stroke-width="1.1" opacity="0.85"/>
  <!-- Signal lines right -->
  <line x1="27" y1="12" x2="27" y2="20" stroke="#cc44ff" stroke-width="1.1" opacity="0.85"/>
  <line x1="30" y1="13" x2="30" y2="19" stroke="#aa22dd" stroke-width="1" opacity="0.8"/>
  <!-- Black hole -->
  <circle cx="16" cy="16" r="5" fill="#000000"/>
  <circle cx="16" cy="16" r="5" fill="none" stroke="#ff8800" stroke-width="0.8" opacity="0.6"/>
</svg>
