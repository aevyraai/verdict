<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 44" width="200" height="44">
  <defs>
    <linearGradient id="tealG-d" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#88ffee"/>
      <stop offset="40%"  stop-color="#00ddcc"/>
      <stop offset="100%" stop-color="#008877"/>
    </linearGradient>
    <filter id="glow-d" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Mini black hole icon -->
  <ellipse cx="22" cy="22" rx="18" ry="4" fill="none" stroke="#cc5500" stroke-width="2.5" opacity="0.5"/>
  <ellipse cx="22" cy="22" rx="15" ry="3" fill="none" stroke="#ee7700" stroke-width="1.5" opacity="0.7"/>
  <ellipse cx="22" cy="22" rx="12" ry="2.2" fill="none" stroke="#ff9922" stroke-width="1" opacity="0.85"/>
  <line x1="4"  y1="18" x2="4"  y2="26" stroke="#00bbff" stroke-width="1" opacity="0.7"/>
  <line x1="7"  y1="16" x2="7"  y2="28" stroke="#00ccff" stroke-width="1.1" opacity="0.8"/>
  <line x1="10" y1="15" x2="10" y2="29" stroke="#00ddff" stroke-width="1.2" opacity="0.85"/>
  <line x1="34" y1="15" x2="34" y2="29" stroke="#cc44ff" stroke-width="1.2" opacity="0.85"/>
  <line x1="37" y1="16" x2="37" y2="28" stroke="#bb33ee" stroke-width="1.1" opacity="0.8"/>
  <line x1="40" y1="18" x2="40" y2="26" stroke="#aa22dd" stroke-width="1" opacity="0.7"/>
  <circle cx="22" cy="22" r="7" fill="#000000"/>
  <circle cx="22" cy="22" r="7" fill="none" stroke="#ff8800" stroke-width="0.8" opacity="0.6"/>

  <!-- AEVYRA wordmark -->
  <text x="52" y="29"
    font-family="Palatino Linotype, Palatino, Book Antiqua, Georgia, serif"
    font-size="22" font-weight="300" letter-spacing="5"
    fill="url(#tealG-d)"
    filter="url(#glow-d)">AEVYRA</text>
</svg>
